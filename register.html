<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — BLOGDAY</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-auth">
<div class="page-overlay"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="brand">BLOG<span>DAY</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="read.html">Read</a></li>
    <li id="nav-auth-1"><a href="login.html" class="nav-outline">Sign In</a></li>
  </ul>
  <button class="hamburger" id="menuToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Home</a>
  <a href="read.html">Read Blogs</a>
  <a href="login.html">Sign In</a>
</div>

<!-- FORM -->
<main class="form-page" role="main" aria-label="Create Account Form">
  <div class="form-card">
    <div class="form-card-accent"></div>
    <div class="form-card-body">
      <p class="form-eyebrow">Join BLOGDAY</p>
      <h1 class="form-title">Create <em>Account</em></h1>

      <div class="field">
        <label for="regUser">Username</label>
        <input type="text" id="regUser" name="username" placeholder="your_username" autocomplete="username" maxlength="40">
        <div class="invalid-feedback" id="regUserErr"></div>
      </div>

      <div class="field">
        <label for="regEmail">Email Address</label>
        <input type="email" id="regEmail" name="email" placeholder="you@example.com" autocomplete="email" maxlength="100">
        <div class="invalid-feedback" id="regEmailErr"></div>
      </div>

      <div class="field">
        <label for="regPass">Password</label>
        <div class="input-eye-wrap">
          <input type="password" id="regPass" name="password" placeholder="••••••••" autocomplete="new-password" maxlength="64">
          <button type="button" class="eye-toggle" id="toggleRegPass" aria-label="Show password">👁</button>
        </div>
        <p class="hint">Min 6 chars · 1 uppercase letter · 1 number</p>
        <div class="invalid-feedback" id="regPassErr"></div>
      </div>

      <div class="alert-error" id="regGenErr"></div>
      <div class="alert-success" id="regSuccess"></div>

      <button class="btn btn-gold btn-full mt-2" id="regBtn">
        Create Account →
      </button>

      <div class="form-divider">or</div>

      <!-- Password links shown on register page too -->
      <div class="form-footer">
        <a href="forgot.html">🔑 Forgot your password?</a>
      </div>
      <div class="form-footer mt-1">
        <a href="change-password.html">🛡️ Change your password</a>
      </div>
      <div class="form-footer mt-1">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p>© <span class="year"></span> <strong>BLOGDAY</strong></p>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
</body>
</html>
