<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write a Blog — BLOGDAY</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-write">
<div class="page-overlay"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="brand">BLOG<span>DAY</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="read.html">Read Blogs</a></li>
    <li id="nav-auth-1"><a href="login.html" class="nav-outline">Sign In</a></li>
    <li id="nav-auth-2"><a href="register.html" class="nav-cta">Join Free</a></li>
  </ul>
  <button class="hamburger" id="menuToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <a href="index.html">Home</a>
  <a href="read.html">Read Blogs</a>
  <a href="login.html" id="mob-signin">Sign In</a>
  <a href="register.html" id="mob-join">Join Free</a>
</div>

<!-- WRITE FORM -->
<main class="write-page" role="main" aria-label="Write Blog Post">
  <div class="write-card">
    <div class="form-card-accent"></div>
    <div class="form-card-body">
      <p class="form-eyebrow">New Post</p>
      <h1 class="form-title">Write Your <em>Story</em></h1>

      <div class="field">
        <label for="blogTitle">Title</label>
        <input type="text" id="blogTitle" placeholder="Give your story a compelling title..." maxlength="120">
        <div class="invalid-feedback" id="blogTitleErr"></div>
      </div>

      <div class="field">
        <label for="blogAuthor">Author Name</label>
        <input type="text" id="blogAuthor" placeholder="Your name or pen name..." maxlength="60">
        <div class="invalid-feedback" id="blogAuthorErr"></div>
      </div>

      <div class="field">
        <label for="blogContent">Content</label>
        <textarea id="blogContent" placeholder="Write your story here… (min 20 characters)" maxlength="10000"></textarea>
        <div class="char-count"><span id="charCount">0</span> / 10,000</div>
        <div class="invalid-feedback" id="blogContentErr"></div>
      </div>

      <div class="alert-error" id="writeGenErr"></div>
      <div class="alert-success" id="writeSuccess"></div>

      <button class="btn btn-gold btn-full mt-2" id="publishBtn">
        Publish Story →
      </button>

      <div style="margin-top:1rem;display:flex;gap:0.75rem;">
        <a href="read.html" class="btn btn-ghost" style="flex:1;font-size:0.78rem;">View All Blogs</a>
        <a href="index.html" class="btn btn-ghost" style="flex:1;font-size:0.78rem;">← Home</a>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p>© <span class="year"></span> <strong>BLOGDAY</strong></p>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
</body>
</html>
