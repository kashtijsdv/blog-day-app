  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-auth">
<div class="page-overlay"></div>

<!-- NAVBAR -->
<nav class="navbar">
  <a href="index.html" class="brand">BLOG<span>DAY</span></a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="read.html">Read</a></li>
    <li><a href="write.html">Write</a></li>
    <li id="nav-auth-1"><a href="login.html" class="nav-outline">Sign In</a></li>
  </ul>
  <button class="hamburger" id="menuToggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <a href="index.html">Home</a>
  <a href="read.html">Read Blogs</a>
  <a href="write.html">Write</a>
  <a href="login.html">Sign In</a>

<!-- FORM -->
<main class="form-page" role="main" aria-label="Change Password Form">
  <div class="form-card">
    <div class="form-card-accent"></div>
    <div class="form-card-body">
      <p class="form-eyebrow">Account Security</p>
      <h1 class="form-title">Change <em>Password</em></h1>

      <div class="field">
        <label for="oldPass">Current Password</label>
        <div class="input-eye-wrap">
          <input type="password" id="oldPass" name="current-password" placeholder="••••••••" autocomplete="current-password" maxlength="64">
          <button type="button" class="eye-toggle" id="toggleOldPass" aria-label="Show password">👁</button>
        </div>
        <div class="invalid-feedback" id="oldPassErr"></div>
      </div>

      <div class="field">
        <label for="newPass">New Password</label>
        <div class="input-eye-wrap">
          <input type="password" id="newPass" name="new-password" placeholder="••••••••" autocomplete="new-password" maxlength="64">
          <button type="button" class="eye-toggle" id="toggleNewPass" aria-label="Show password">👁</button>
        </div>
        <p class="hint">Min 6 chars · 1 uppercase letter · 1 number</p>
        <div class="invalid-feedback" id="newPassErr"></div>
      </div>

      <div class="alert-error" id="changeGenErr"></div>
      <div class="alert-success" id="changeSuccess"></div>

      <button class="btn btn-gold btn-full mt-2" id="changePassBtn">
        Update Password →
      </button>

      <div class="form-divider">or</div>

      <div class="form-footer">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p>© <span class="year"></span> <strong>BLOGDAY</strong></p>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
</body>
</html>
